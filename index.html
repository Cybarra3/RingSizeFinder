<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Ring Size Finder</title>

    <meta
        name="theme-color"
        content="#111111">

    <meta
        name="apple-mobile-web-app-capable"
        content="yes">

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="black-translucent">

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Poppins:wght@300;400;500;600&display=swap"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="style.css">

</head>

<body>

<div id="backgroundGlow"></div>

<div id="sparkles"></div>

<main id="app">

<!-- =====================================================
WELCOME SCREEN
====================================================== -->

<section
    id="welcome"
    class="screen active">

    <div class="hero">

        <img
            src="assets/logo.jpg"
            id="logo"
            alt="Ring Size Finder">

        <h1>

            Ring Size Finder

        </h1>

        <h2>

            Find Your Perfect Fit

        </h2>

        <p>

            This tool helps estimate your
            United States ring size.

        </p>

        <img
            src="assets/diamond.jpg"
            class="diamondHero"
            alt="Diamond">

        <button
            id="beginBtn"
            class="goldButton">

            Begin

        </button>

    </div>

</section>

<!-- =====================================================
CALIBRATION SCREEN
====================================================== -->

<section
    id="calibration"
    class="screen">

    <div class="card">

        <h2>

            Screen Calibration

        </h2>

        <p>

            Place a standard credit card
            over the rectangle below.

        </p>

        <p>

            Move the slider until
            the rectangle matches
            the exact size
            of your card.

        </p>

        <div
            id="cardContainer">

            <div
                id="cardBox">

            </div>

        </div>

        <input

            id="cardSlider"

            type="range"

            min="70"

            max="110"

            value="86">

        <button

            id="continueBtn"

            class="goldButton">

            Continue

        </button>

    </div>

</section>
